<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Driveリンク変換</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Google Drive 共有リンク変換</h1>
    <p class="description">
      Google Drive の共有リンクを貼り付けると、直接ダウンロード用URLに変換します。<br>
      1行に1リンクずつ入力してください。
    </p>

    <label for="inputUrls" class="label">共有リンク一覧</label>
    <textarea
      id="inputUrls"
      placeholder="https://drive.google.com/file/d/FILE_ID/view?usp=sharing&#10;https://drive.google.com/file/d/ANOTHER_ID/view?usp=sharing"
      rows="10"
    ></textarea>

    <div class="actions">
      <button id="convertBtn">変換する</button>
      <button id="clearBtn" class="secondary">クリア</button>
      <button id="copyAllBtn" class="secondary">変換後URLを全てコピー</button>
    </div>

    <section class="results-section">
      <h2>変換結果</h2>
      <div id="results" class="results"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
